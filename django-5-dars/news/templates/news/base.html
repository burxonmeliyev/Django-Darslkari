{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}News Portal{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'news/css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="{% url 'news:news_list' %}">NewsHub</a>
            <nav class="nav-links">
                <a href="{% url 'news:news_list' %}">Home</a>
                <a href="{% url 'news:news_list' %}">Latest</a>
            </nav>
        </div>
    </header>

    <main class="page-content container">
        {% block content %}{% endblock %}
    </main>

    <footer class="page-footer">
        <div class="container footer-inner">
            <p>© {{ now|date:"Y" }} NewsHub. Eng yaxshi yangiliklar.</p>
            <span>Fast, clean, responsive template</span>
        </div>
    </footer>
</body>
</html>
